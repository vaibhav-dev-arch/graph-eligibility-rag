# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: graph-eligibility-marketingtech
    runtime: python
    plan: free
    buildCommand: bash scripts/render_build.sh
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: AUTO_SEED_ON_STARTUP
        value: "true"
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
