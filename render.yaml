# Optional Blueprint — manual Web Service deploy is recommended (see README).
services:
  - type: web
    name: graph-eligibility-rag
    runtime: python
    plan: free
    buildCommand: bash scripts/render_build.sh
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: AUTO_SEED_ON_STARTUP
        value: "true"
      - key: EMBEDDING_BACKEND
        value: precomputed
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
