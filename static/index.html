<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Eligibility RAG</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    .muted { color: #555; }
    code { background: #f4f4f5; padding: 0.1rem 0.35rem; border-radius: 4px; }
    button { background: #2563eb; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 0.5rem 0; }
    button:disabled { opacity: 0.5; }
    pre { background: #0f1419; color: #e7ecf3; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.8rem; }
    .links a { margin-right: 1rem; }
  </style>
</head>
<body>
  <h1>Graph Eligibility RAG</h1>
  <p class="muted">Hybrid GraphRAG — vector similarity + Neo4j eligibility constraints + explainable ranking for content recommendation.</p>

  <p class="links">
    <a href="/docs">API docs</a>
    <a href="/health">Health</a>
    <a href="https://github.com/vaibhav-dev-arch/graph-eligibility-rag">GitHub</a>
  </p>

  <button id="runDemo" onclick="runDemo()">Run demo query</button>
  <p class="muted" id="status"></p>
  <pre id="output">Click "Run demo query" to POST /demo (summer sale discount, top 5, explain=true)</pre>

  <script>
    async function runDemo() {
      const btn = document.getElementById("runDemo");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      btn.disabled = true;
      status.textContent = "Running hybrid retrieval + eligibility filter + ranking...";
      try {
        const resp = await fetch("/demo", { method: "POST" });
        const data = await resp.json();
        if (!resp.ok) {
          const health = await fetch("/health").then(r => r.json());
          throw new Error(data.detail || JSON.stringify(data) + "\n\nHealth: " + JSON.stringify(health, null, 2));
        }
        output.textContent = JSON.stringify(data, null, 2);
        status.textContent = `Done in ${data.latency_ms}ms — ${data.results?.length || 0} results`;
      } catch (e) {
        output.textContent = e.message;
        status.textContent = "Failed — check /health (Neo4j connection required)";
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
